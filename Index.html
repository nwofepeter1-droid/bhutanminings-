<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhutan Minings</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginScreen">
  <h2>Bhutan Minings</h2>
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">

  <header>Bhutan Minings Dashboard</header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Mining</a>
    <a href="#">Plans</a>
  </nav>

  <div class="hero">
    <h1>Mining Simulator</h1>
    <button onclick="mine()">Start Mining</button>
  </div>

  <div class="dashboard">
    <div class="balance-box">
      <p id="output">Balance: 0 BTC</p>
    </div>
  </div>

  <footer>© 2019 Bhutan Minings</footer>

</div>

<script src="game.js"></script>
<div class="chat">💬</div>
</body>
</html>
